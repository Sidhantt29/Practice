<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bat Ball Wicket Game</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
      <h1>Bat Ball Wicket Game</h1>
  </header>
  <div class="button-container">
    <button class="button" onclick="
    console.log('You have Chosen Bat')
    computerGenerate(); 
    let resultGame;
    if(computerChoice==='Ball'){
      resultGame='You Won';
      //console.log('You Won')
    }
    else if(computerChoice==='Wicket'){
      resultGame='Computer Won';

      //console.log('Computer Won')
    }
    else{
            resultGame='Game Tied!!!';

      //console.log('Game Tied!!!')
    }
    alert(`You have Chosen Bat. Computer chosen ${computerChoice}. ${resultGame}`);

    
    ">Bat</button>
    <button class="button" onclick="
    console.log('You have Chosen Ball')
    computerGenerate();
    if(computerChoice==='Bat'){
      resultGame='You Won';
      //console.log('You Won')
    }
    else if(computerChoice==='Wicket'){
      resultGame='Computer Won';

      //console.log('Computer Won')
    }
    else{
            resultGame='Game Tied!!!';

      //console.log('Game Tied!!!')
    }
    alert(`You have Chosen Ball. Computer chosen ${computerChoice}. ${resultGame}`);
    ">Ball</button>
    <button class="button" onclick="
    console.log('You have Chosen Wicket')
    computerGenerate();
    if(computerChoice==='Bat'){
      resultGame='You Won';
      //console.log('You Won')
    }
    else if(computerChoice==='Ball'){
      resultGame='Computer Won';

      //console.log('Computer Won')
    }
    else{
            resultGame='Game Tied!!!';

      //console.log('Game Tied!!!')
    }
    alert(`You have Chosen Wicket. Computer chosen ${computerChoice}. ${resultGame}`);

    ">Wicket</button>

  </div>
  <script>
    let computerChoice;

    function computerGenerate(){
      let randomNumber = Math.random() * 3
      if(randomNumber > 0 && randomNumber <= 1){
      computerChoice='Bat';
     // console.log('Computer Chosen Bat')
    } else if(randomNumber >1 && randomNumber <= 2){
      computerChoice ='Ball';
     // console.log('Computer Chosen Ball')
    }else if(randomNumber >2 && randomNumber <= 3){
      computerChoice='Wicket';
     // console.log('Computer Chosen Wicket')
    }
    }
  </script>
</body>
</html>
