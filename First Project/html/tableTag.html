<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Tag</title>
</head>
<body>
  <table border="1">
    <caption>Information of Student</caption>
    <tr>
      <th colspan="3">Report card of Student</th>
    </tr>
    <tr>
      <th>Name</th>
      <th>Class</th>
      <th>Subject</th>
    </tr>
    <tr>
      <td>Sidhant</td>
      <td>5</td>
      <td>Math</td>
    </tr>
    <tr>
      <td>Surbhi</td>
      <td>9</td>
      <td>Chemistry</td>
    </tr>
  </table>
</body>
</html>
